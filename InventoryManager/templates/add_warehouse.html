{% extends "base.html" %}

{% block title %}Add Warehouse — Inventory Manager{% endblock %}

{% block content %}
  <h1>Add Warehouse</h1>
  {% if error %}
    <p style="color: red">{{ error }}</p>
  {% endif %}
  <form method="post">
    <p>
      <label>Name:<br>
      <input type="text" name="name" value="{{ name or '' }}" required>
      </label>
    </p>
    <p>
      <label>Location:<br>
      <input type="text" name="location" value="{{ location or '' }}">
      </label>
    </p>
    <p>
      <label>Capacity:<br>
      <input type="number" name="capacity" min="0" value="{{ capacity or '' }}">
      </label>
    </p>
    <p>
      <button type="submit" class="btn btn-primary">Create Warehouse</button>
      <a href="{{ url_for('index') }}" class="btn">Cancel</a>
    </p>
  </form>
{% endblock %}

{% extends "base.html" %}

{% block title %}Login — Inventory Manager{% endblock %}

{% block content %}
  <h1>Login</h1>
  {% if error %}
    <p style="color: red">{{ error }}</p>
  {% endif %}
  <form method="post">
    <p>
      <label>Username:<br>
      <input type="text" name="username" value="{{ username or '' }}" required>
      </label>
    </p>
    <p>
      <label>Password:<br>
      <input type="password" name="password" required>
      </label>
    </p>
    <p>
      <button type="submit" class="btn btn-primary">Login</button>
      <a href="{{ url_for('register') }}" class="btn">Register</a>
    </p>
  </form>
{% endblock %}
